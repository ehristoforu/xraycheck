# Workflow: сброс истории репозитория (одна "осиротевшая" ветка + один коммит)
# и очистка всей истории запусков Actions (все workflow runs в репо, кроме текущего, удаляются через API).
# Запуск: вручную (workflow_dispatch) или автоматически после успешного завершения Update Repository Stats.
# После push история коммитов в репо будет одна запись.

name: Squash & clean

on:
  workflow_dispatch:
  # workflow_run:
  #   workflows: ["Update Repository Stats"]
  #   types: [completed]
  #   branches: [main]

concurrency:
  group: xraycheck-serial
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  clean-workflow-runs:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      actions: write
    steps:
      - name: Delete previous workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const currentRunId = context.runId;
            let totalDeleted = 0;
            let page = 1;
            const perPage = 100;
            while (true) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                per_page: perPage,
                page
              });
              const runs = data.workflow_runs || [];
              for (const run of runs) {
                // Удаляем успешные и отменённые запуски; завершённые с ошибкой оставляем для анализа.
                if (run.id !== currentRunId && (run.conclusion === 'success' || run.conclusion === 'cancelled')) {
                  try {
                    await github.rest.actions.deleteWorkflowRun({ owner, repo, run_id: run.id });
                    totalDeleted++;
                  } catch (e) {
                    console.warn('Could not delete run ' + run.id, e.message);
                  }
                }
              }
              if (runs.length < perPage) break;
              page++;
            }
            console.log('Deleted ' + totalDeleted + ' previous workflow run(s).');

      - name: Delete Actions caches not accessed for 3 days
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const cutoffMs = Date.now() - 3 * 24 * 60 * 60 * 1000;
            const cutoffIso = new Date(cutoffMs).toISOString();

            let totalScanned = 0;
            let totalDeleted = 0;
            let page = 1;
            const perPage = 100;

            while (true) {
              const { data } = await github.request('GET /repos/{owner}/{repo}/actions/caches', {
                owner,
                repo,
                per_page: perPage,
                page,
              });

              const caches = data.actions_caches || [];
              totalScanned += caches.length;

              for (const c of caches) {
                const last = c.last_accessed_at || c.created_at || null;
                if (!last) continue;
                if (Date.parse(last) >= cutoffMs) continue;

                try {
                  await github.request('DELETE /repos/{owner}/{repo}/actions/caches/{cache_id}', {
                    owner,
                    repo,
                    cache_id: c.id,
                  });
                  totalDeleted++;
                } catch (e) {
                  console.warn(`Could not delete cache ${c.id} (${c.key || 'no-key'})`, e.message);
                }
              }

              if (caches.length < perPage) break;
              page++;
            }

            console.log(`Caches scanned: ${totalScanned}`);
            console.log(`Caches deleted (last_accessed_at < ${cutoffIso}): ${totalDeleted}`);

  squash-and-push:
    runs-on: ubuntu-latest
    needs: clean-workflow-runs
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Squash history (orphan branch + force push)
        run: |
          # 1. Переключиться на новую "осиротевшую" ветку (без истории)
          git checkout --orphan temp_branch

          # 2. Добавить все файлы из текущего состояния (как в последнем коммите)
          git add -A

          # 3. Сделать новый начальный коммит
          git commit -m "Initial commit: current state"

          # 4. Удалить старую ветку main/master (одна из них есть)
          git branch -D main 2>/dev/null || true
          git branch -D master 2>/dev/null || true

          # 5. Переименовать новую ветку в main
          git branch -m main

          # 6. Принудительно обновить удалённый репозиторий
          git push -f origin main
