# Speedtest конфигов из configs/available и configs/white-list_available
# configs/available_st, configs/available_st(top100) - speedtest на хосте (без Docker).
# configs/white-list_available_st, configs/white-list_available_st(top100) - speedtest в Docker (CIDR whitelist, как в daily-check-docker).
# Запускается: после Daily DOCKER check, по расписанию каждые 30 мин (кроме окон 21:30-00:30 и 10:00-12:00 UTC), вручную.
# Параметры speedtest - из .env (см. комментарии в шагах).

name: Speedtest

on:
  schedule:
    # Каждые 30 мин (UTC), без окон
    - cron: '0,30 * * * *'
  workflow_run:
    workflows: ["Daily DOCKER check"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MAX_WORKERS: 1000
  BASE_PORT: 20000
  # Малое ожидание старта: помогает отсеять "мгновенно падающие" процессы, не превращаясь в слепой sleep
  XRAY_STARTUP_WAIT: 0.3
  XRAY_STARTUP_POLL_INTERVAL: 0.2
  SPEED_TEST_ENABLED: 'true'
  # Увеличено: влияет также на потолок ожидания открытия локального SOCKS (timeout + 5)
  SPEED_TEST_TIMEOUT: 8
  SPEED_TEST_MODE: full
  SPEED_TEST_METRIC: latency
  SPEED_TEST_OUTPUT: separate_file
  SPEED_TEST_REQUESTS: 12
  SPEED_TEST_URL: https://www.gstatic.com/generate_204
  SPEED_TEST_WORKERS: 700
  SPEED_TEST_DOWNLOAD_TIMEOUT: 20
  SPEED_TEST_DOWNLOAD_URL_SMALL: https://speed.cloudflare.com/__down?bytes=250000
  SPEED_TEST_DOWNLOAD_URL_MEDIUM: https://speed.cloudflare.com/__down?bytes=1000000
  MIN_SPEED_THRESHOLD_MBPS: 3
  SPEED_TEST_DEBUG: 'false'
  OUTPUT_DIR: configs
  VERIFY_HTTPS_SSL: 'false'
  # Запас на медленный старт/инициализацию: реальное ожидание ограничено min(XRAY_PORT_WAIT, SPEED_TEST_TIMEOUT + 5)
  XRAY_PORT_WAIT: 20

  # Hysteria startup: аналогично - упирается в min(HYSTERIA_PORT_WAIT, SPEED_TEST_TIMEOUT + 5)
  HYSTERIA_STARTUP_WAIT: 0.0
  HYSTERIA_STARTUP_POLL_INTERVAL: 0.2
  HYSTERIA_PORT_WAIT: 20

  # strip_vpn_comments.py: текст комментария (после флага страны) для проверенных конфигов
  AUTO_COMMENT: ' verified · t.me/XRayCheck'

  # CIDR whitelist: контейнер использует файл cidrlist в корне (обновляется в workflow Update tools по vars.CIDR_WHITELIST_URL).
  # Fallback URL для контейнера, если cidrlist отсутствует (переопределяется из vars.CIDR_WHITELIST_URL).
  CIDR_WHITELIST_URL: ${{ vars.CIDR_WHITELIST_URL || 'https://raw.githubusercontent.com/hxehex/russia-mobile-internet-whitelist/refs/heads/main/cidrwhitelist.txt' }}

concurrency:
  group: xraycheck-serial
  cancel-in-progress: false

jobs:
  preflight-update:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      cidrlist_updated: ${{ steps.update_cidrlist.outputs.cidrlist_updated }}
      cidrlist_lines_before: ${{ steps.update_cidrlist.outputs.cidrlist_lines_before }}
      cidrlist_lines_after: ${{ steps.update_cidrlist.outputs.cidrlist_lines_after }}
    env:
      CIDR_WHITELIST_URL: ${{ vars.CIDR_WHITELIST_URL || 'https://raw.githubusercontent.com/hxehex/russia-mobile-internet-whitelist/refs/heads/main/cidrwhitelist.txt' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Attempt to update cidrlist from CIDR_WHITELIST_URL (if changed)
        id: update_cidrlist
        run: |
          set -e
          LINES_BEFORE=$(wc -l < cidrlist 2>/dev/null || echo 0)
          echo "Preflight: fetching CIDR list from CIDR_WHITELIST_URL..."
          content=$(curl -sLf --connect-timeout 15 --max-time 30 "$CIDR_WHITELIST_URL") || { echo "::warning::Failed to fetch CIDR list, cidrlist unchanged"; echo "cidrlist_updated=false" >> $GITHUB_OUTPUT; exit 0; }
          echo "$content" | grep -v '^[[:space:]]*$' | grep -v '^[[:space:]]*#' | sort > /tmp/remote_cidr
          if [ ! -s /tmp/remote_cidr ]; then
            echo "::warning::Remote CIDR list is empty (no non-comment lines), cidrlist unchanged"
            echo "cidrlist_updated=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          local_body=""
          if [ -f cidrlist ]; then
            first=$(head -n 1 cidrlist)
            if [ "${first#\#}" != "$first" ]; then
              local_body=$(tail -n +2 cidrlist)
            else
              local_body=$(cat cidrlist)
            fi
          fi
          echo "$local_body" | grep -v '^[[:space:]]*$' | grep -v '^[[:space:]]*#' | sort > /tmp/local_cidr
          if diff -q /tmp/local_cidr /tmp/remote_cidr >/dev/null 2>&1; then
            echo "cidrlist unchanged (same content as remote), skip"
            echo "cidrlist_updated=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "# Updated: $(date -u '+%Y-%m-%d %H:%M:%S') UTC" > cidrlist
          echo "$content" >> cidrlist
          LINES_AFTER=$(wc -l < cidrlist)
          echo "cidrlist_updated=true" >> $GITHUB_OUTPUT
          echo "cidrlist_lines_before=$LINES_BEFORE" >> $GITHUB_OUTPUT
          echo "cidrlist_lines_after=$LINES_AFTER" >> $GITHUB_OUTPUT
          echo "cidrlist updated locally"

      - name: Attempt to update Xray and Hysteria binaries (tools/)
        run: |
          bash tools/update-binaries.sh || echo "::warning::tools/update-binaries.sh failed, continuing with existing tools/"

      - name: Commit and push if tools/cidrlist changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep -Eq '^( M|A |\?\?) (tools/|cidrlist)'; then
            git add cidrlist tools/xray tools/hysteria 2>/dev/null || true
            if git diff --cached --quiet; then
              echo "No changes to commit"
            else
              git commit -m "chore: update tools/cidrlist [automated]"
              if ! git pull --rebase origin main; then
                echo "::warning::git pull --rebase failed, skipping push"
                git rebase --abort || true
                exit 0
              fi
              git push || echo "::warning::git push failed, continuing"
            fi
          else
            echo "No changes in tools/ or cidrlist, skip push"
          fi

  speedtest-and-publish:
    needs: preflight-update
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    outputs:
      stats_workflow_name: ${{ steps.telegram_stats.outputs.workflow_name }}
      stats_keys_in: ${{ steps.telegram_stats.outputs.keys_in }}
      stats_keys_out: ${{ steps.telegram_stats.outputs.keys_out }}
      stats_duration: ${{ steps.telegram_stats.outputs.duration }}
      stats_cidrlist_line: ${{ steps.telegram_stats.outputs.cidrlist_line }}
    env:
      XRAY_PATH: ${{ github.workspace }}/tools/xray
      HYSTERIA_PATH: ${{ github.workspace }}/tools/hysteria

    steps:
      - name: Record start time
        id: start
        run: echo "started_at=$(date -u +%s)" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup Xray and Hysteria binaries
        run: bash tools/setup-binaries.sh

      - name: Ensure configs/available exists, warn if white-list_available missing/empty
        run: |
          # available must существовать и быть непустым
          if [ ! -f "configs/available" ]; then
            echo "::error::configs/available not found. Run Daily VLESS check first."
            exit 1
          fi
          if [ ! -s "configs/available" ]; then
            echo "::error::configs/available is empty."
            exit 1
          fi
          echo "configs/available: $(wc -l < configs/available) lines"

          # white-list_available может быть ещё не создан или пустым → просто предупреждаем
          if [ ! -f "configs/white-list_available" ]; then
            echo "::warning::configs/white-list_available not found (Daily DOCKER check not run or produced no output). Speedtest will run only for configs/available."
          elif [ ! -s "configs/white-list_available" ]; then
            echo "::warning::configs/white-list_available is empty. Speedtest will run only for configs/available."
          else
            echo "configs/white-list_available: $(wc -l < configs/white-list_available) lines"
          fi

      - name: "Split configs/available into Xray and Hysteria"
        run: |
          python - << 'PY'
          from pathlib import Path
          prefixes = ("hysteria://", "hysteria2://", "hy2://")
          for in_name, xray_name, hyst_name in [
              ("available", "available_xray", "available_hysteria"),
              ("white-list_available", "white-list_available_xray", "white-list_available_hysteria"),
          ]:
              in_path = Path("configs", in_name)
              xray_path = Path("configs", xray_name)
              hyst_path = Path("configs", hyst_name)
              xray_lines, hyst_lines = [], []
              with in_path.open(encoding="utf-8") as f:
                  for line in f:
                      s = line.strip()
                      if not s or s.startswith("#"):
                          continue
                      (hyst_lines if s.startswith(prefixes) else xray_lines).append(line)
              xray_path.write_text("".join(xray_lines), encoding="utf-8")
              hyst_path.write_text("".join(hyst_lines), encoding="utf-8")
              print(f"{in_name}: Xray {len(xray_lines)}, Hysteria {len(hyst_lines)}")
          PY

      - name: "Speedtest Xray: configs/available_xray"
        run: |
          if [ -s "configs/available_xray" ]; then
            python speedtest_checker.py configs/available_xray
          else
            echo "No Xray lines in available, skip"
          fi
        env:
          MAX_WORKERS: ${{ env.MAX_WORKERS }}
          BASE_PORT: ${{ env.BASE_PORT }}
          XRAY_STARTUP_WAIT: ${{ env.XRAY_STARTUP_WAIT }}
          XRAY_STARTUP_POLL_INTERVAL: ${{ env.XRAY_STARTUP_POLL_INTERVAL }}
          VERIFY_HTTPS_SSL: ${{ env.VERIFY_HTTPS_SSL }}
          SPEED_TEST_ENABLED: ${{ env.SPEED_TEST_ENABLED }}
          SPEED_TEST_TIMEOUT: ${{ env.SPEED_TEST_TIMEOUT }}
          SPEED_TEST_MODE: ${{ env.SPEED_TEST_MODE }}
          SPEED_TEST_METRIC: ${{ env.SPEED_TEST_METRIC }}
          SPEED_TEST_OUTPUT: ${{ env.SPEED_TEST_OUTPUT }}
          SPEED_TEST_REQUESTS: ${{ env.SPEED_TEST_REQUESTS }}
          SPEED_TEST_URL: ${{ env.SPEED_TEST_URL }}
          SPEED_TEST_WORKERS: ${{ env.SPEED_TEST_WORKERS }}
          SPEED_TEST_DOWNLOAD_TIMEOUT: ${{ env.SPEED_TEST_DOWNLOAD_TIMEOUT }}
          SPEED_TEST_DOWNLOAD_URL_SMALL: ${{ env.SPEED_TEST_DOWNLOAD_URL_SMALL }}
          SPEED_TEST_DOWNLOAD_URL_MEDIUM: ${{ env.SPEED_TEST_DOWNLOAD_URL_MEDIUM }}
          MIN_SPEED_THRESHOLD_MBPS: ${{ env.MIN_SPEED_THRESHOLD_MBPS }}
          SPEED_TEST_DEBUG: ${{ env.SPEED_TEST_DEBUG }}
          OUTPUT_DIR: ${{ env.OUTPUT_DIR }}

      - name: "Speedtest Hysteria: configs/available_hysteria"
        run: |
          if [ -s "configs/available_hysteria" ]; then
            python speedtest_hysteria.py configs/available_hysteria
          else
            touch configs/available_hysteria_st
          fi

      - name: "Merge available: Xray + Hysteria -> configs/available_st"
        run: |
          xray="configs/available_xray_st"
          hyst="configs/available_hysteria_st"
          out="configs/available_st"
          out100="configs/available_st(top100)"
          # Всегда обновляем top100, чтобы он не "залипал" старым при пустом FULL.
          : > "$out100"
          # awk вместо grep: не ломается на "binary file matches" из-за NUL байтов.
          { [ -s "$xray" ] && cat "$xray"; [ -s "$hyst" ] && cat "$hyst"; } | awk 'NF' > "$out" || true
          if [ -s "$out" ]; then head -n 100 "$out" > "$out100"; fi
          echo "available_st: $(wc -l < "$out" 2>/dev/null || echo 0) lines"

      - name: Ensure .env exists for docker compose
        if: hashFiles('configs/white-list_available') != ''
        run: touch .env

      - name: Set up Docker Buildx
        if: hashFiles('configs/white-list_available') != ''
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: hashFiles('configs/white-list_available') != ''
        run: docker compose build

      - name: "Run speedtest for white-list in Docker (CIDR whitelist)"
        if: hashFiles('configs/white-list_available') != ''
        env:
          OUTPUT_DIR: configs
        run: |
          echo "CIDR: настройки сетей из локального файла cidrlist (корень репо), в контейнере /app/cidrlist, применяются в entrypoint для iptables."
          if [ -f "cidrlist" ]; then echo "cidrlist в репо: $(wc -l < cidrlist | tr -d ' ') строк"; else echo "::warning::cidrlist отсутствует, контейнер возьмёт список по URL"; fi
          if [ -f "configs/white-list_available" ] && [ -s "configs/white-list_available" ]; then
            N=$(wc -l < "configs/white-list_available" | tr -d ' ')
            echo "Передача в контейнер (speedtest only): $N строк из configs/white-list_available"
            cat configs/white-list_available | docker compose run --rm -T \
            -e DOCKER_SPEEDTEST_ONLY=true \
            -e OUTPUT_DIR="$OUTPUT_DIR" \
            -e MAX_WORKERS="$MAX_WORKERS" \
            -e VERIFY_HTTPS_SSL="$VERIFY_HTTPS_SSL" \
            -e SPEED_TEST_ENABLED="$SPEED_TEST_ENABLED" \
            -e SPEED_TEST_TIMEOUT="$SPEED_TEST_TIMEOUT" \
            -e SPEED_TEST_MODE="$SPEED_TEST_MODE" \
            -e SPEED_TEST_METRIC="$SPEED_TEST_METRIC" \
            -e SPEED_TEST_OUTPUT="$SPEED_TEST_OUTPUT" \
            -e SPEED_TEST_REQUESTS="$SPEED_TEST_REQUESTS" \
            -e SPEED_TEST_URL="$SPEED_TEST_URL" \
            -e SPEED_TEST_WORKERS="$SPEED_TEST_WORKERS" \
            -e SPEED_TEST_DOWNLOAD_TIMEOUT="$SPEED_TEST_DOWNLOAD_TIMEOUT" \
            -e SPEED_TEST_DOWNLOAD_URL_SMALL="$SPEED_TEST_DOWNLOAD_URL_SMALL" \
            -e SPEED_TEST_DOWNLOAD_URL_MEDIUM="$SPEED_TEST_DOWNLOAD_URL_MEDIUM" \
            -e MIN_SPEED_THRESHOLD_MBPS="$MIN_SPEED_THRESHOLD_MBPS" \
            -e SPEED_TEST_DEBUG="$SPEED_TEST_DEBUG" \
            -e XRAY_STARTUP_WAIT="$XRAY_STARTUP_WAIT" \
            -e XRAY_STARTUP_POLL_INTERVAL="$XRAY_STARTUP_POLL_INTERVAL" \
            -e XRAY_PORT_WAIT="$XRAY_PORT_WAIT" \
            -e HYSTERIA_STARTUP_WAIT="$HYSTERIA_STARTUP_WAIT" \
            -e HYSTERIA_STARTUP_POLL_INTERVAL="$HYSTERIA_STARTUP_POLL_INTERVAL" \
            -e HYSTERIA_PORT_WAIT="$HYSTERIA_PORT_WAIT" \
            -e BASE_PORT="$BASE_PORT" \
            -e CIDR_WHITELIST_FILE=/app/cidrlist \
            -e CIDR_WHITELIST_URL="$CIDR_WHITELIST_URL" \
            vless-checker -
            echo "white-list_available_st: $(wc -l < configs/white-list_available_st 2>/dev/null || echo 0) lines"
          else
            touch configs/white-list_available_st "configs/white-list_available_st(top100)"
            echo "white-list_available пуст или отсутствует, созданы пустые white-list_available_st"
          fi

      - name: Fix permissions on Docker output (white-list_available_st)
        if: hashFiles('configs/white-list_available') != ''
        run: |
          if [ -f "configs/white-list_available_st" ]; then sudo chown "$(whoami):$(id -gn)" configs/white-list_available_st; fi
          if [ -f "configs/white-list_available_st(top100)" ]; then sudo chown "$(whoami):$(id -gn)" "configs/white-list_available_st(top100)"; fi

      - name: Normalize comments (strip + add flag and AUTO_COMMENT)
        if: env.AUTO_COMMENT != ''
        run: |
          for base in available_st "white-list_available_st"; do
            if [ -s "configs/$base" ]; then
              python strip_vpn_comments.py "configs/$base" -o "configs/$base"
              echo "Normalized configs/$base"
            fi
            if [ -s "configs/${base}(top100)" ]; then
              python strip_vpn_comments.py "configs/${base}(top100)" -o "configs/${base}(top100)"
              echo "Normalized configs/${base}(top100)"
            fi
          done
        env:
          AUTO_COMMENT: ${{ env.AUTO_COMMENT }}

      - name: Verify output and update last-updated.json
        run: |
          if [ ! -f "configs/available_st" ] && [ ! -f "configs/white-list_available_st" ]; then
            echo "::warning::Neither configs/available_st nor configs/white-list_available_st created (no successful results?), skip push"
            exit 0
          fi
          for base in available_st "white-list_available_st"; do
            if [ -f "configs/$base" ] && [ ! -f "configs/${base}(top100)" ]; then
              head -n 100 "configs/$base" > "configs/${base}(top100)"
            fi
          done
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          C_AV=$(wc -l < configs/available_st 2>/dev/null || echo 0)
          C_AV100=$(wc -l < "configs/available_st(top100)" 2>/dev/null || echo 0)
          C_WL=$(wc -l < configs/white-list_available_st 2>/dev/null || echo 0)
          C_WL100=$(wc -l < "configs/white-list_available_st(top100)" 2>/dev/null || echo 0)
          OLD=$(cat configs/last-updated.json 2>/dev/null || echo '{}')
          echo "$OLD" | jq -c --arg t "$NOW" \
            --argjson c_av "$C_AV" --argjson c_av100 "$C_AV100" \
            --argjson c_wl "$C_WL" --argjson c_wl100 "$C_WL100" \
            '.["configs/available_st"] = {updated: $t, count: $c_av} |
             .["configs/available_st(top100)"] = {updated: $t, count: $c_av100} |
             .["configs/white-list_available_st"] = {updated: $t, count: $c_wl} |
             .["configs/white-list_available_st(top100)"] = {updated: $t, count: $c_wl100}' \
            > configs/last-updated.json
          echo "Output:"
          ls -la configs/available_st "configs/available_st(top100)" configs/white-list_available_st "configs/white-list_available_st(top100)" 2>/dev/null || true

      - name: Commit and push speedtest results
        run: |
          if [ ! -f "configs/available_st" ] && [ ! -f "configs/white-list_available_st" ]; then
            echo "Nothing to commit (no successful speedtest results)."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in configs/available_st "configs/available_st(top100)" configs/white-list_available_st "configs/white-list_available_st(top100)" configs/last-updated.json; do
            [ -f "$f" ] && git add "$f"
          done
          if ! git diff --cached --quiet; then
            git commit -m "update speedtest [automated]"
            git pull --no-rebase origin "${{ github.ref_name }}" || true
            if [ -f .git/MERGE_HEAD ]; then
              if grep -q '^<<<<<<<' configs/last-updated.json 2>/dev/null; then
                git checkout --theirs configs/last-updated.json
                OLD=$(cat configs/last-updated.json 2>/dev/null || echo '{}')
                NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                C_AV=$(wc -l < configs/available_st 2>/dev/null || echo 0)
                C_AV100=$(wc -l < "configs/available_st(top100)" 2>/dev/null || echo 0)
                C_WL=$(wc -l < configs/white-list_available_st 2>/dev/null || echo 0)
                C_WL100=$(wc -l < "configs/white-list_available_st(top100)" 2>/dev/null || echo 0)
                echo "$OLD" | jq -c --arg t "$NOW" \
                  --argjson c_av "$C_AV" --argjson c_av100 "$C_AV100" \
                  --argjson c_wl "$C_WL" --argjson c_wl100 "$C_WL100" \
                  '.["configs/available_st"] = {updated: $t, count: $c_av} |
                   .["configs/available_st(top100)"] = {updated: $t, count: $c_av100} |
                   .["configs/white-list_available_st"] = {updated: $t, count: $c_wl} |
                   .["configs/white-list_available_st(top100)"] = {updated: $t, count: $c_wl100}' \
                  > configs/last-updated.json
                git add configs/last-updated.json
              fi
              git commit -m "Merge remote; resolve last-updated.json"
            fi
            git push
          else
            echo "Speedtest results unchanged, skip push"
          fi

      - name: Prepare Telegram stats
        id: telegram_stats
        run: |
          K_IN=0
          [ -f configs/available ] && K_IN=$((K_IN + $(wc -l < configs/available)))
          [ -f configs/white-list_available ] && K_IN=$((K_IN + $(wc -l < configs/white-list_available)))
          K_OUT=0
          [ -f configs/available_st ] && K_OUT=$((K_OUT + $(wc -l < configs/available_st)))
          [ -f configs/white-list_available_st ] && K_OUT=$((K_OUT + $(wc -l < configs/white-list_available_st)))
          END=$(date -u +%s)
          START=${{ steps.start.outputs.started_at }}
          DURATION_SEC=$(( END - START ))
          printf -v DURATION "%d:%02d" $(( DURATION_SEC / 60 )) $(( DURATION_SEC % 60 ))
          echo "workflow_name=Speedtest" >> $GITHUB_OUTPUT
          echo "keys_in=$K_IN" >> $GITHUB_OUTPUT
          echo "keys_out=$K_OUT" >> $GITHUB_OUTPUT
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          CIDRLIST_LINE=""
          if [ "${{ needs.preflight-update.outputs.cidrlist_updated }}" = "true" ]; then
            B="${{ needs.preflight-update.outputs.cidrlist_lines_before }}"
            A="${{ needs.preflight-update.outputs.cidrlist_lines_after }}"
            CIDRLIST_LINE="строк ${B} → ${A}"
          fi
          echo "cidrlist_line=$CIDRLIST_LINE" >> $GITHUB_OUTPUT

  notify-telegram:
    needs: speedtest-and-publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Send workflow stats to Telegram
        uses: ./.github/actions/telegram-workflow-stats
        with:
          workflow_name: ${{ needs.speedtest-and-publish.outputs.stats_workflow_name }}
          keys_in: ${{ needs.speedtest-and-publish.outputs.stats_keys_in }}
          keys_out: ${{ needs.speedtest-and-publish.outputs.stats_keys_out }}
          duration: ${{ needs.speedtest-and-publish.outputs.stats_duration }}
